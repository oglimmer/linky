services:
  mariadb:
    image: mariadb:12
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: linky
      MYSQL_USER: linky
      MYSQL_PASSWORD: linky
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  linky:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: "linky:linky@tcp(mariadb:3306)/linky?parseTime=true&multiStatements=true"
      JWT_SECRET: "change-me-in-production"
    depends_on:
      mariadb:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - linky

volumes:
  mariadb_data:
