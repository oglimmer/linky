<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Linky Archiver</h1>

    <div id="current-url" class="url-display"></div>

    <button id="archive-btn" class="btn-primary">Archive this page</button>

    <div id="status" class="status hidden"></div>
    <a id="result-link" class="result-link hidden" target="_blank"></a>

    <hr>

    <div id="auth-status" class="auth-status"></div>
    <button id="login-btn" class="btn-secondary">Login with SSO</button>
    <button id="logout-btn" class="btn-secondary hidden">Logout</button>
    <div id="login-status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
