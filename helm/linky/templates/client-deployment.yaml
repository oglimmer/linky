apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "linky.fullname" . }}-client
  labels:
    {{- include "linky.clientLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "linky.clientSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "linky.clientSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: client
          image: "{{ .Values.client.image.repository }}:{{ .Values.client.image.tag }}"
          imagePullPolicy: {{ .Values.client.image.pullPolicy }}
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "linky.fullname" . }}-nginx
