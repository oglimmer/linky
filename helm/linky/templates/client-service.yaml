apiVersion: v1
kind: Service
metadata:
  name: {{ include "linky.fullname" . }}-client
  labels:
    {{- include "linky.clientLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "linky.clientSelectorLabels" . | nindent 4 }}
